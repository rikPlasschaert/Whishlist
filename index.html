<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .product-image-container { position: relative; width: 100%; height: 240px; background: white; overflow: hidden; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #f1f5f9; }
        .product-image { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); padding: 1.5rem; }
        .group:hover .product-image { transform: scale(1.05); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        @keyframes shimmer { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .animate-scan { animation: shimmer 2s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SCRAPE_DO_TOKEN = "38ce259dcf6348e189b93804ca2f95b1a77692955fd";
        const STORAGE_KEY = 'my_wishlist_data_v1';

        const Icon = ({ name, className = "w-5 h-5", fill = "none" }) => {
            const icons = {
                plus: <path d="M12 5v14M5 12h14" />,
                trash: <React.Fragment><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></React.Fragment>,
                external: <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" />,
                search: <React.Fragment><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></React.Fragment>,
                bag: <React.Fragment><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></React.Fragment>,
                download: <React.Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></React.Fragment>,
                image: <React.Fragment><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></React.Fragment>,
                heart: <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : [];
            });
            const [adding, setAdding] = useState(false);
            const [urlInput, setUrlInput] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [activeCategory, setActiveCategory] = useState('ALL');
            const [showFavoritesOnly, setShowFavoritesOnly] = useState(false);
            const [error, setError] = useState(null);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
            }, [items]);

            const scrapeProduct = async (url) => {
                const cleanUrl = url.trim().split('?')[0];
                const urlObj = new URL(cleanUrl);
                const baseUrl = `${urlObj.protocol}//${urlObj.host}`;
                
                // --- STEALTH SCRAPER UPGRADE ---
                // superProxy=true: residential IPs
                // render=true: JS execution
                // wait=5000: wait 5s for Bol's bot challenges to solve
                // customHeaders=true: forward our headers to the destination
                const apiUrl = `https://api.scrape.do?token=${SCRAPE_DO_TOKEN}&url=${encodeURIComponent(cleanUrl)}&geoCode=eu&render=true&superProxy=true&wait=5000&customHeaders=true`;
                
                let html = "";
                let attempts = 0;
                
                while (attempts < 2) {
                    try {
                        const response = await fetch(apiUrl, {
                            headers: {
                                "X-Scrape-Do-User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                            }
                        });
                        if (response.ok) {
                            html = await response.text();
                            // Check if Bol returned a block page even with 200 OK
                            if (html.includes("Robot") || html.includes("challenge") || html.includes("Access Denied")) {
                                throw new Error("Blocked by Store");
                            }
                            break;
                        }
                    } catch (e) {
                        console.error("Fetch attempt error:", e);
                    }
                    attempts++;
                    if (attempts < 2) await new Promise(r => setTimeout(r, 4000));
                }

                if (!html) throw new Error("The store is currently blocking the scan. Try again in 30 seconds.");

                const extractMeta = (prop) => {
                    const regex = new RegExp(`<meta[^>]*?(?:property|name|itemprop)=["'](?:og:|product:|twitter:|)${prop}["'][^>]*?content=["']([^"']+)["']|<meta[^>]*?content=["']([^"']+)["'][^>]*?(?:property|name|itemprop)=["'](?:og:|product:|twitter:|)${prop}["']`, 'i');
                    const match = html.match(regex);
                    return match ? (match[1] || match[2]) : null;
                };

                const resolveUrl = (foundUrl) => {
                    if (!foundUrl) return null;
                    if (foundUrl.startsWith('http')) return foundUrl;
                    if (foundUrl.startsWith('//')) return `https:${foundUrl}`;
                    return new URL(foundUrl, baseUrl).href;
                };

                const title = extractMeta('title') || extractMeta('og:title') || (html.match(/<title[^>]*>([\s\S]*?)<\/title>/i)?.[1]?.trim()) || "New Product";
                const desc = extractMeta('description') || extractMeta('og:description') || "";
                
                let image = extractMeta('image') || extractMeta('og:image') || extractMeta('twitter:image');
                if (!image) {
                    const bolImgMatch = html.match(/data-product-image=["']([^"']+)["']/i) || 
                                     html.match(/class=["']js-product-main-image["'][^>]*src=["']([^"']+)["']/i);
                    if (bolImgMatch) image = bolImgMatch[1];
                }
                if (!image) {
                    const imgJsonMatch = html.match(/"image"\s*:\s*(?:"([^"]+)"|{\s*"url"\s*:\s*"([^"]+)"|\[\s*"([^"]+)")/i);
                    if (imgJsonMatch) image = imgJsonMatch[1] || imgJsonMatch[2] || imgJsonMatch[3];
                }
                image = resolveUrl(image);
                
                let brand = extractMeta('brand') || extractMeta('og:brand');
                if (!brand) {
                    const brandJson = html.match(/"brand"\s*:\s*(?:{\s*"@type"\s*:\s*"Brand"\s*,\s*"name"\s*:\s*"([^"]+)"|{\s*"name"\s*:\s*"([^"]+)"|"([^"]+)")/i);
                    if (brandJson) brand = brandJson[1] || brandJson[2] || brandJson[3];
                }
                if (!brand) brand = title.split(/[|\-]/)[0].trim().split(" ")[0].replace(/[^a-zA-Z0-9]/g, "");

                // Category logic
                let category = extractMeta('category') || extractMeta('product:category');
                if (!category) {
                    const bcMatch = html.match(/"ListItem"[^}]+?"name"\s*:\s*"([^"]+)"/gi);
                    if (bcMatch && bcMatch.length > 2) {
                        const target = bcMatch[bcMatch.length - 2];
                        category = target.match(/"name"\s*:\s*"([^"]+)"/i)?.[1];
                    }
                }

                const fullText = (title + " " + desc + " " + (category || "")).toLowerCase();
                const categoryKeywords = {
                    "FOTOCAMERA": ["camera", "fotocamera", "dslr", "mirrorless", "body", "eos", "lumix", "alpha"],
                    "LENS": ["lens", "objectief", "mm f/", "zoom lens", "prime lens"],
                    "GAMING": ["ps5", "playstation", "xbox", "nintendo", "switch", "gaming", "game", "controller", "sony interactive"],
                    "LAPTOP": ["laptop", "macbook", "notebook", "chromebook"],
                    "SMARTPHONE": ["smartphone", "iphone", "galaxy", "pixel", "mobile phone"],
                    "AUDIO": ["headphone", "speaker", "audio", "earbuds", "soundbar"]
                };

                for (const [key, keywords] of Object.entries(categoryKeywords)) {
                    if (keywords.some(k => fullText.includes(k))) {
                        category = key;
                        break;
                    }
                }
                if (!category || category === "Other") category = "OTHER";

                let priceVal = extractMeta('price:amount') || extractMeta('amount') || extractMeta('price');
                if (!priceVal || priceVal === "0") {
                    const priceJsonMatch = html.match(/"price"\s*:\s*"?([\d.,]+)"?/i);
                    if (priceJsonMatch) priceVal = priceJsonMatch[1];
                }
                if (!priceVal || priceVal === "0") {
                    const bolPriceMatch = html.match(/class=["']promo-price["'][^>]*>\s*([\d]+)[^<]*<span>([\d]*)</i);
                    if (bolPriceMatch) priceVal = bolPriceMatch[1] + "." + (bolPriceMatch[2] || "00");
                }

                if (priceVal && priceVal !== "0") {
                    priceVal = priceVal.replace(/[^\d.,]/g, '').replace(',', '.');
                    const parts = priceVal.split('.');
                    if (parts.length > 2) priceVal = parts[0] + '.' + parts.slice(1).join('');
                } else {
                    priceVal = "Check Site";
                }

                const currency = extractMeta('price:currency') || "€";
                const domain = cleanUrl.split('/')[2]?.replace('www.', '') || "Store";

                return {
                    id: Date.now(),
                    title,
                    image,
                    brand: brand || "Unknown",
                    price: priceVal === "Check Site" ? priceVal : `${currency} ${priceVal}`,
                    category: category.toUpperCase(),
                    url: cleanUrl,
                    domain,
                    isFavorite: false,
                    createdAt: new Date().toISOString()
                };
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                if (!urlInput || adding) return;
                setAdding(true);
                setError(null);
                try {
                    const data = await scrapeProduct(urlInput);
                    setItems([data, ...items]);
                    setUrlInput('');
                } catch (err) {
                    setError(err.message);
                } finally {
                    setAdding(false);
                }
            };

            const removeItem = (id) => {
                setItems(items.filter(item => item.id !== id));
            };

            const toggleFavorite = (id) => {
                setItems(items.map(item => 
                    item.id === id ? { ...item, isFavorite: !item.isFavorite } : item
                ));
            };

            const backupData = () => {
                const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `wishlist_backup.json`; a.click();
            };

            const filteredItems = useMemo(() => {
                return items.filter(item => {
                    const matchesSearch = item.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                         item.brand.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesCat = activeCategory === 'ALL' || item.category === activeCategory;
                    const matchesFav = !showFavoritesOnly || item.isFavorite;
                    return matchesSearch && matchesCat && matchesFav;
                });
            }, [items, searchTerm, activeCategory, showFavoritesOnly]);

            const cats = useMemo(() => ['ALL', ...Array.from(new Set(items.map(i => i.category)))].sort(), [items]);

            return (
                <div className="min-h-screen pb-20">
                    <header className="glass sticky top-0 z-50 border-b border-slate-200">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
                            <div className="flex items-center gap-2 shrink-0">
                                <div className="bg-indigo-600 p-2 rounded-xl shadow-lg"><Icon name="bag" className="text-white" /></div>
                                <span className="font-extrabold text-xl hidden sm:block tracking-tight text-slate-800">My Wishlist</span>
                            </div>
                            <form onSubmit={handleAdd} className="flex-1 max-w-xl flex gap-2">
                                <input 
                                    type="url" value={urlInput} onChange={e => setUrlInput(e.target.value)}
                                    placeholder="Paste URL (Bol.com, Amazon, PS Store...)" 
                                    className="flex-1 bg-white border border-slate-200 px-4 py-2 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm shadow-sm transition-all"
                                    required
                                />
                                <button type="submit" disabled={adding} className="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2 transition-all active:scale-95 shadow-md disabled:opacity-50">
                                    {adding ? <div className="w-4 h-4 border-2 border-white border-t-transparent animate-spin rounded-full"></div> : <Icon name="plus" className="w-4 h-4" />}
                                    <span className="hidden sm:inline">{adding ? "Scanning..." : "Add"}</span>
                                </button>
                            </form>
                            <button onClick={backupData} className="p-2 text-slate-400 hover:text-indigo-600 transition-colors" title="Backup">
                                <Icon name="download" />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-8">
                        {error && (
                            <div className="mb-6 p-4 bg-red-50 text-red-700 border border-red-100 rounded-2xl flex items-center gap-3 animate-scan">
                                <Icon name="alert" />
                                <span className="text-sm font-bold">{error}</span>
                            </div>
                        )}

                        <div className="flex flex-col md:flex-row justify-between gap-4 mb-8">
                            <div className="flex flex-wrap items-center gap-2">
                                <button 
                                    onClick={() => setShowFavoritesOnly(!showFavoritesOnly)}
                                    className={`p-2 rounded-xl border transition-all ${showFavoritesOnly ? 'bg-rose-50 border-rose-200 text-rose-600' : 'bg-white border-slate-200 text-slate-400'}`}
                                >
                                    <Icon name="heart" className="w-5 h-5" fill={showFavoritesOnly ? 'currentColor' : 'none'} />
                                </button>
                                <div className="h-6 w-px bg-slate-200 mx-1 hidden sm:block"></div>
                                {cats.map(c => (
                                    <button 
                                        key={c} onClick={() => setActiveCategory(c)}
                                        className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${activeCategory === c ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white border border-slate-200 text-slate-500 hover:border-slate-300'}`}
                                    >
                                        {c}
                                    </button>
                                ))}
                            </div>
                            <div className="relative">
                                <div className="absolute left-3 top-2.5 text-slate-400"><Icon name="search" className="w-4 h-4" /></div>
                                <input 
                                    type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                    className="pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl outline-none text-sm w-full md:w-64 focus:ring-2 focus:ring-indigo-500 shadow-sm"
                                    placeholder="Search wishlist..."
                                />
                            </div>
                        </div>

                        {filteredItems.length > 0 ? (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                {filteredItems.map(item => (
                                    <div key={item.id} className="bg-white rounded-[32px] border border-slate-200 overflow-hidden flex flex-col group hover:shadow-2xl hover:-translate-y-1.5 transition-all duration-500 relative">
                                        <div className="product-image-container relative">
                                            {item.image ? (
                                                <img src={item.image} alt={item.title} className="product-image" loading="lazy" onError={(e) => {e.target.style.display='none'}} />
                                            ) : (
                                                <div className="w-full h-full flex flex-col items-center justify-center bg-slate-50 opacity-10">
                                                    <Icon name="image" className="w-12 h-12" />
                                                </div>
                                            )}
                                            <div className="absolute top-4 right-4 flex flex-col gap-2 translate-x-12 opacity-0 group-hover:translate-x-0 group-hover:opacity-100 transition-all duration-300">
                                                <button onClick={() => toggleFavorite(item.id)} className={`p-2 rounded-full shadow-lg backdrop-blur-md transition-all ${item.isFavorite ? 'bg-rose-500 text-white' : 'bg-white/90 text-slate-400 hover:text-rose-500'}`}><Icon name="heart" className="w-4 h-4" fill={item.isFavorite ? 'currentColor' : 'none'} /></button>
                                                <button onClick={() => removeItem(item.id)} className="p-2 bg-white/90 text-slate-400 hover:text-red-600 rounded-full shadow-lg backdrop-blur-md transition-all"><Icon name="trash" className="w-4 h-4" /></button>
                                            </div>
                                        </div>
                                        <div className="p-6 flex-1 flex flex-col">
                                            <div className="flex justify-between items-start mb-3">
                                                <span className="bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">{item.category}</span>
                                                {item.isFavorite && <Icon name="heart" className="w-4 h-4 text-rose-500" fill="currentColor" />}
                                            </div>
                                            <h3 className="font-bold text-lg leading-tight mb-1 line-clamp-2 text-slate-800" title={item.title}>{item.title}</h3>
                                            <div className="text-slate-400 text-[11px] font-bold mb-4 uppercase tracking-widest">{item.brand}</div>
                                            <div className="mt-auto inline-flex bg-slate-900 text-white px-4 py-2 rounded-2xl font-black text-xl tracking-tight shadow-md">{item.price}</div>
                                        </div>
                                        <div className="px-6 py-5 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                                            <div className="flex items-center gap-2 overflow-hidden">
                                                <div className="w-6 h-6 rounded bg-white border border-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-400 uppercase shrink-0">{item.domain?.charAt(0)}</div>
                                                <span className="text-[10px] font-black uppercase text-slate-400 tracking-tighter truncate max-w-[80px]">{item.domain}</span>
                                            </div>
                                            <a href={item.url} target="_blank" rel="noopener noreferrer" className="bg-white px-4 py-2 rounded-xl border border-indigo-100 text-indigo-600 font-bold text-xs flex items-center gap-2 hover:bg-indigo-600 hover:text-white transition-all shadow-sm">Shop <Icon name="external" className="w-3.5 h-3.5" /></a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="py-40 text-center border-2 border-dashed border-slate-200 rounded-[40px] text-slate-400 bg-white shadow-inner">
                                <Icon name="bag" className="mx-auto w-16 h-16 mb-6 opacity-5" />
                                <h2 className="text-xl font-bold text-slate-800 mb-2">{showFavoritesOnly ? "No favorites found" : "Wishlist is empty"}</h2>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
