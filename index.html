<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Wishlist (No-Cloud Version)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .product-image-container { position: relative; width: 100%; height: 240px; background: white; overflow: hidden; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #f1f5f9; }
        .product-image { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); padding: 1.5rem; }
        .group:hover .product-image { transform: scale(1.05); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Constants
        const SCRAPE_DO_TOKEN = "38ce259dcf6348e189b93804ca2f95b1a77692955fd";
        const STORAGE_KEY = 'my_wishlist_data_v1';

        const Icon = ({ name, className = "w-5 h-5" }) => {
            const icons = {
                plus: <path d="M12 5v14M5 12h14" />,
                trash: <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" />,
                external: <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" />,
                search: <React.Fragment><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></React.Fragment>,
                bag: <React.Fragment><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></React.Fragment>,
                download: <React.Fragment><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></React.Fragment>,
                image: <React.Fragment><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></React.Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : [];
            });
            const [adding, setAdding] = useState(false);
            const [urlInput, setUrlInput] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [activeCategory, setActiveCategory] = useState('ALL');
            const [error, setError] = useState(null);

            // Sync with LocalStorage whenever items change
            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
            }, [items]);

            const scrapeProduct = async (url) => {
                const cleanUrl = url.trim().split('?')[0];
                const urlObj = new URL(cleanUrl);
                const baseUrl = `${urlObj.protocol}//${urlObj.host}`;
                
                const apiUrl = `https://api.scrape.do?token=${SCRAPE_DO_TOKEN}&url=${encodeURIComponent(cleanUrl)}`;
                
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("Scraper error.");
                const html = await response.text();

                const extractMeta = (prop) => {
                    const regex = new RegExp(`<meta[^>]*?(?:property|name|itemprop)=["'](?:og:|product:|twitter:|)${prop}["'][^>]*?content=["']([^"']+)["']|<meta[^>]*?content=["']([^"']+)["'][^>]*?(?:property|name|itemprop)=["'](?:og:|product:|twitter:|)${prop}["']`, 'i');
                    const match = html.match(regex);
                    return match ? (match[1] || match[2]) : null;
                };

                const resolveUrl = (foundUrl) => {
                    if (!foundUrl) return null;
                    if (foundUrl.startsWith('http')) return foundUrl;
                    if (foundUrl.startsWith('//')) return `https:${foundUrl}`;
                    return new URL(foundUrl, baseUrl).href;
                };

                const title = extractMeta('title') || extractMeta('og:title') || (html.match(/<title[^>]*>([\s\S]*?)<\/title>/i)?.[1]?.trim()) || "New Product";
                
                let image = extractMeta('image') || extractMeta('og:image') || extractMeta('twitter:image');
                if (!image) {
                    const imgJsonMatch = html.match(/"image"\s*:\s*(?:"([^"]+)"|{\s*"url"\s*:\s*"([^"]+)"|\[\s*"([^"]+)")/i);
                    if (imgJsonMatch) image = imgJsonMatch[1] || imgJsonMatch[2] || imgJsonMatch[3];
                }
                if (!image) {
                    const imgTagMatch = html.match(/<(?:img|source)[^>]+(?:id|class)=["'](?:landingImage|main-image|product-image|hero-image)[^>]+src=["']([^"']+)["']/i);
                    if (imgTagMatch) image = imgTagMatch[1];
                }
                image = resolveUrl(image);
                
                let brand = extractMeta('brand') || extractMeta('og:brand');
                if (!brand) {
                    const brandJson = html.match(/"brand"\s*:\s*(?:{\s*"@type"\s*:\s*"Brand"\s*,\s*"name"\s*:\s*"([^"]+)"|{\s*"name"\s*:\s*"([^"]+)"|"([^"]+)")/i);
                    if (brandJson) brand = brandJson[1] || brandJson[2] || brandJson[3];
                }
                if (!brand) brand = title.split(/[|\-]/)[0].trim().split(" ")[0].replace(/[^a-zA-Z0-9]/g, "");

                let category = extractMeta('category') || extractMeta('product:category');
                if (!category) {
                    const bcMatch = html.match(/"ListItem"[^}]+?"name"\s*:\s*"([^"]+)"/gi);
                    category = bcMatch && bcMatch.length > 1 ? bcMatch[bcMatch.length-1].match(/"name"\s*:\s*"([^"]+)"/i)?.[1] : "Other";
                }
                if (!category || category === "Other") {
                    const parts = title.split(/[|]/);
                    category = parts.length > 1 ? parts[1].trim() : "OTHER";
                }
                if (category.toLowerCase().includes("game") || title.toLowerCase().includes("ps5")) category = "GAMING";

                let priceVal = null;
                const priceMetaTags = ['price:amount', 'amount', 'price'];
                for (let tag of priceMetaTags) {
                    let found = extractMeta(tag);
                    if (found) { priceVal = found; break; }
                }
                if (!priceVal) {
                    const priceJsonMatch = html.match(/"price"\s*:\s*"?([\d.,]+)"?/i);
                    if (priceJsonMatch) priceVal = priceJsonMatch[1];
                }
                if (priceVal) priceVal = priceVal.replace(/[^\d.,]/g, '').replace(',', '.');
                else priceVal = "Check Site";

                const currency = extractMeta('price:currency') || "€";
                const domain = cleanUrl.split('/')[2]?.replace('www.', '') || "Store";

                return {
                    id: Date.now(),
                    title,
                    image,
                    brand: brand || "Unknown",
                    price: priceVal === "Check Site" ? priceVal : `${currency} ${priceVal}`,
                    category: category.toUpperCase(),
                    url: cleanUrl,
                    domain,
                    createdAt: new Date().toISOString()
                };
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                if (!urlInput || adding) return;
                setAdding(true);
                setError(null);
                try {
                    const data = await scrapeProduct(urlInput);
                    setItems([data, ...items]);
                    setUrlInput('');
                } catch (err) {
                    setError("Scraper failed. Some sites block price checks.");
                } finally {
                    setAdding(false);
                }
            };

            const removeItem = (id) => {
                setItems(items.filter(item => item.id !== id));
            };

            const backupData = () => {
                const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `wishlist_backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            const filteredItems = useMemo(() => {
                return items.filter(item => {
                    const matchesSearch = item.title.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesCat = activeCategory === 'ALL' || item.category === activeCategory;
                    return matchesSearch && matchesCat;
                });
            }, [items, searchTerm, activeCategory]);

            const cats = useMemo(() => ['ALL', ...Array.from(new Set(items.map(i => i.category)))].sort(), [items]);

            return (
                <div className="min-h-screen pb-20">
                    <header className="glass sticky top-0 z-50 border-b border-slate-200">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
                            <div className="flex items-center gap-2 shrink-0">
                                <div className="bg-indigo-600 p-2 rounded-xl shadow-lg"><Icon name="bag" className="text-white" /></div>
                                <span className="font-extrabold text-xl hidden sm:block">Wishlist</span>
                            </div>
                            <form onSubmit={handleAdd} className="flex-1 max-w-xl flex gap-2">
                                <input 
                                    type="url" value={urlInput} onChange={e => setUrlInput(e.target.value)}
                                    placeholder="Paste product link..." 
                                    className="flex-1 bg-white border border-slate-200 px-4 py-2 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm shadow-sm"
                                    required
                                />
                                <button type="submit" disabled={adding} className="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold flex items-center gap-2">
                                    {adding ? <div className="w-4 h-4 border-2 border-white border-t-transparent animate-spin rounded-full"></div> : <Icon name="plus" className="w-4 h-4" />}
                                    <span className="hidden sm:inline">Add</span>
                                </button>
                            </form>
                            <button onClick={backupData} className="p-2 text-slate-400 hover:text-indigo-600" title="Download Backup">
                                <Icon name="download" />
                            </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 py-8">
                        {error && (
                            <div className="mb-6 p-4 bg-red-50 text-red-700 border border-red-100 rounded-2xl flex items-center gap-3">
                                <Icon name="alert" />
                                <span className="text-sm font-bold">{error}</span>
                            </div>
                        )}

                        <div className="flex flex-col md:flex-row justify-between gap-4 mb-8">
                            <div className="flex flex-wrap gap-2">
                                {cats.map(c => (
                                    <button 
                                        key={c} onClick={() => setActiveCategory(c)}
                                        className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${activeCategory === c ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white border border-slate-200 text-slate-500'}`}
                                    >
                                        {c}
                                    </button>
                                ))}
                            </div>
                            <input 
                                type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)}
                                className="px-4 py-2 bg-white border border-slate-200 rounded-xl outline-none text-sm w-full md:w-64"
                                placeholder="Search wishlist..."
                            />
                        </div>

                        {filteredItems.length > 0 ? (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                {filteredItems.map(item => (
                                    <div key={item.id} className="bg-white rounded-[32px] border border-slate-200 overflow-hidden flex flex-col group hover:shadow-xl transition-all duration-300">
                                        <div className="product-image-container">
                                            {item.image ? <img src={item.image} className="product-image" loading="lazy" /> : <Icon name="image" className="opacity-10 w-12 h-12" />}
                                        </div>
                                        <div className="p-6 flex-1 flex flex-col">
                                            <div className="flex justify-between items-start mb-3">
                                                <span className="bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">{item.category}</span>
                                                <button onClick={() => removeItem(item.id)} className="text-slate-200 hover:text-red-500"><Icon name="trash" className="w-4 h-4" /></button>
                                            </div>
                                            <h3 className="font-bold text-lg leading-tight mb-1 line-clamp-2">{item.title}</h3>
                                            <div className="text-slate-400 text-[11px] font-bold mb-4 uppercase tracking-widest">{item.brand}</div>
                                            <div className="mt-auto inline-flex bg-slate-900 text-white px-4 py-2 rounded-2xl font-black text-xl">{item.price}</div>
                                        </div>
                                        <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-between items-center">
                                            <span className="text-[10px] font-black uppercase text-slate-400 tracking-tighter truncate max-w-[100px]">{item.domain}</span>
                                            <a href={item.url} target="_blank" className="text-indigo-600 font-bold text-xs flex items-center gap-1">Shop <Icon name="external" className="w-3 h-3" /></a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="py-40 text-center border-2 border-dashed border-slate-200 rounded-[40px] text-slate-400">
                                <Icon name="bag" className="mx-auto w-12 h-12 mb-4 opacity-10" />
                                <p className="font-bold uppercase tracking-widest">No items found</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
